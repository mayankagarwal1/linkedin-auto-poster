name: LinkedIn Automated Agent

on:
  schedule:
    # Shifted to off-peak minutes (e.g., :17, :43)
    - cron: '17 3 * * *'  # Target: ~08:47 AM IST
    - cron: '43 15 * * *'  # Target: ~09:13 PM IST
    - cron: '13 18 * * *' # Target: ~11:43 PM IST
    - cron: '11 20 * * *'  # Target: ~01:41 AM IST
    - cron: '37  22 * * *' # Target: ~04:07 AM IST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-to-linkedin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14" # Fixed to match your local pyproject.toml
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Install dependencies with uv
        run: |
          uv venv --clear
          uv pip install -r requirements.txt

      - name: Run the Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
        run: uv run python run.py